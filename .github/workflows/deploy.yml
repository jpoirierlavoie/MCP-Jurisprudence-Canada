name: deploy

# ⚠ ORDRE IMPÉRATIF (spécification §12) : LES MIGRATIONS D'ABORD, LE DÉPLOIEMENT
#   ENSUITE. Le schéma inverse met en ligne du code qui lit des colonnes
#   inexistantes — et un connecteur juridique qui échoue en silence sur une
#   colonne manquante est exactement le défaut que ce dépôt cherche à rendre
#   impossible.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Un seul déploiement à la fois : deux exécutions concurrentes pourraient appliquer
# des migrations dans le désordre.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deployer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Filet : on ne déploie pas un arbre qui ne compile pas ou dont les tests
      # échouent, même si la CI a déjà tourné sur la PR.
      - name: Types du Worker
        run: npx wrangler types
      - name: Type-check
        run: npx tsc --noEmit
      - name: Tests
        run: npx vitest run

      - name: Migrations D1 (AVANT le déploiement)
        run: npx wrangler d1 migrations apply canlii --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Déploiement
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
