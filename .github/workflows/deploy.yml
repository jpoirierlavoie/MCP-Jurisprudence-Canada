name: deploy

# ⚠ ORDRE IMPÉRATIF (spécification §12) : LES MIGRATIONS D'ABORD, LE DÉPLOIEMENT
#   ENSUITE. Le schéma inverse met en ligne du code qui lit des colonnes
#   inexistantes — et un connecteur juridique qui échoue en silence sur une
#   colonne manquante est exactement le défaut que ce dépôt cherche à rendre
#   impossible.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Un seul déploiement à la fois : deux exécutions concurrentes pourraient appliquer
# des migrations dans le désordre.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deployer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Filet : on ne déploie pas un arbre qui ne compile pas ou dont les tests
      # échouent, même si la CI a déjà tourné sur la PR.
      - name: Types du Worker
        run: npx wrangler types
      - name: Type-check
        run: npx tsc --noEmit
      - name: Tests
        run: npx vitest run

      - name: Migrations D1 (AVANT le déploiement)
        run: npx wrangler d1 migrations apply canlii --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Déploiement
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
