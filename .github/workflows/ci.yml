name: ci

# Contrôles sans réseau ni secret : type-check, mise en forme, tests (workerd +
# D1 locale, réponses de CanLII figées), et validation du paquet de déploiement.
# Aucun appel à api.canlii.org : la suite doit être verte sans la clef d'API,
# faute de quoi elle dépendrait du quota d'une clef personnelle (§16.2).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verifier:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Génère worker-configuration.d.ts (gitignoré, aucune authentification requise).
      - name: Types du Worker
        run: npx wrangler types

      - name: Type-check
        run: npx tsc --noEmit

      - name: Mise en forme et lint
        run: npx biome check .

      - name: Tests
        run: npx vitest run

      # Valide le paquet ET la configuration (bindings, limites, domaine) sans
      # rien déployer. Ne demande aucun jeton Cloudflare.
      - name: Paquet de déploiement (à blanc)
        run: npx wrangler deploy --dry-run
