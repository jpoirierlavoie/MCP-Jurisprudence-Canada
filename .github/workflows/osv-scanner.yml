name: OSV-Scanner

on:
  pull_request:
    branches: ["main"]
  merge_group:
    branches: ["main"]
  schedule:
    - cron: '40 11 * * 4'
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  scan:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # BLOQUANT : un constat fait échouer le contrôle au lieu d'être avalé en
      # silence (le SARIF est tout de même téléversé, via `if: always()`).
      # Les exceptions sont dans `osv-scanner.toml`, chacune motivée et datée —
      # ce n'est PAS un « continue-on-error ».
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@a82132c0bd6c7261ffcb78e754c46c70ab57ad9a # v2.3.5
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --format=sarif
            --output=results.sarif
            --lockfile=package-lock.json

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif
          category: osv-scanner
