version: 2
updates:
  # Toutes les dépendances de ce dépôt sont de DÉVELOPPEMENT (décision D2 : zéro
  # dépendance d'exécution, le paquet déployé n'embarque aucun paquet npm). Le
  # groupage mineur/correctif est donc sans risque pour la production ; seules les
  # montées majeures de wrangler méritent une revue.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
      timezone: "America/Montreal"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      dev-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
      timezone: "America/Montreal"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
